name: Build Atleta Bridge

on:
  push:
    paths:
      - 'bridge/**'
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Windows Build Tools
        shell: pwsh
        continue-on-error: true
        run: |
          npm install -g node-gyp
          # Install Windows SDK component into VS2022
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify `
            --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise" `
            --add Microsoft.VisualStudio.Component.Windows11SDK.22621 `
            --quiet --norestart --wait
          Write-Host "Windows SDK install step completed"

      - name: Install dependencies
        working-directory: bridge
        run: npm install
        env:
          GYP_MSVS_VERSION: '2022'

      - name: Build Windows installer
        working-directory: bridge
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atleta-bridge-installer
          path: bridge/dist/*.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bridge-v${{ github.run_number }}
          name: Atleta Bridge v1.0.${{ github.run_number }}
          files: bridge/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
