name: Build Atleta Bridge

on:
  push:
    paths:
      - 'bridge/**'
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (without native addons)
        working-directory: bridge
        run: npm install --ignore-scripts

      - name: Fix node-irsdk BOM character in binding.gyp
        working-directory: bridge
        shell: pwsh
        run: |
          $file = "node_modules/node-irsdk/binding.gyp"
          if (Test-Path $file) {
            $content = [System.IO.File]::ReadAllText($file)
            $content = $content.TrimStart([char]0xFEFF)
            [System.IO.File]::WriteAllText($file, $content, [System.Text.UTF8Encoding]::new($false))
            Write-Host "Fixed BOM in binding.gyp"
          }

      - name: Rebuild native addons
        working-directory: bridge
        run: npm rebuild

      - name: Build Windows installer
        working-directory: bridge
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: atleta-bridge-installer
          path: bridge/dist/*.exe

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: bridge-v${{ github.run_number }}
          name: Atleta Bridge v1.0.${{ github.run_number }}
          files: bridge/dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
